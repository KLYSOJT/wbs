<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recto Memorial NHS | Admin Login</title>
    <link rel="stylesheet" href="../../css/admin/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="portal-wrapper">
       

        <main class="login-card">
            
            <div class="brand-section">
                 <!-- Back Button -->
        <a href="../../pages/user/app.html" class="back-button">
            <span>←</span>
        </a>
                <div class="brand-content">
                    
                </div>
            </div>

            <div class="form-section">
                <div class="form-wrapper">
                    <header class="header-content">
                        <span class="badge">Secure Admin Access</span>
                        <h2>Welcome Back</h2>
                        <p>Enter your credentials to manage operations.</p>
                    </header>

                    <div id="errorBox" class="alert-box error" style="display:none;">
                        Invalid security key or email address.
                    </div>

                    <form id="adminForm">
                        <div class="input-group">
                            <input type="email" id="email" name="email" autocomplete="email" required placeholder=" ">
                            <label for="email">Email Address</label>
                        </div>

                        <div class="input-group">
                            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder=" ">
                            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password" aria-pressed="false">
                                <span class="eye-open" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" focusable="false">
                                        <path d="M1.5 12S5.5 5.25 12 5.25 22.5 12 22.5 12 18.5 18.75 12 18.75 1.5 12 1.5 12Z"></path>
                                        <circle cx="12" cy="12" r="3.25"></circle>
                                    </svg>
                                </span>
                                <span class="eye-closed" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" focusable="false">
                                        <path d="M3 3 21 21"></path>
                                        <path d="M10.58 10.58A2 2 0 0 0 10 12a2 2 0 0 0 3.42 1.42"></path>
                                        <path d="M9.88 5.09A10.94 10.94 0 0 1 12 4.88c6.5 0 10.5 7.12 10.5 7.12a17.55 17.55 0 0 1-4.04 4.78"></path>
                                        <path d="M6.61 6.61A17.73 17.73 0 0 0 1.5 12s4 7.12 10.5 7.12a10.8 10.8 0 0 0 4.09-.8"></path>
                                    </svg>
                                </span>
                            </button>
                            <label for="password">Security Key</label>
                        </div>

                        <div class="utils">
                            <label class="custom-checkbox" for="rememberDevice">
                                <input type="checkbox" id="rememberDevice" name="rememberDevice">
                                <span class="box"></span>
                                Remember this device
                            </label>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span>Access Admin</span>
                        </button>
                    </form>

                    <footer class="footer-note">
                        <p>&copy; 2026 RMNS Digital Infrastructure</p>
                    </footer>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase Auth Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/admin-login.js"></script>
</body>
</html>
